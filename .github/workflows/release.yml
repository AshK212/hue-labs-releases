# Hue Labs — production Windows release pipeline.
#
# Flow:
# Build → Azure OIDC login → sign backend → verify backend →
# create unpacked Windows app without electron-builder signing →
# sign unpacked app with Azure Artifact Signing →
# build installer + portable from the signed unpacked app →
# sign final distributables → verify → upload →
# optionally publish the exact verified files to GitHub Releases.
#
# Required GitHub Environment:
#   release
#
# Required Environment Variables:
#   AZURE_TENANT_ID
#   AZURE_CLIENT_ID
#   AZURE_SUBSCRIPTION_ID
#
# Azure federated credential:
#   Repository: AshK212/hue-labs-releases
#   Environment: release

name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish verified artifacts to GitHub Releases"
        type: boolean
        required: true
        default: false

permissions:
  id-token: write
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, verify, and publish
    runs-on: windows-latest
    environment: release

    env:
      AZURE_CODE_SIGNING_ENDPOINT: https://eus.codesigning.azure.net/
      AZURE_TRUSTED_SIGNING_ACCOUNT: huelabs
      AZURE_CERT_PROFILE: huelabs-cert

      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci
          npm --prefix frontend ci
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Build frontend and Electron sources
        shell: pwsh
        run: npm run build

      - name: Build Python backend executable
        shell: pwsh
        run: npm run backend:build

      - name: Confirm backend executable exists
        shell: pwsh
        run: |
          $backendExe = "backend\dist\lao-backend\lao-backend.exe"

          if (-not (Test-Path -LiteralPath $backendExe)) {
            throw "Backend executable was not created: $backendExe"
          }

          Write-Host "Backend executable found: $backendExe"

      - name: Azure login using OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Sign backend executable with Azure Artifact Signing
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.AZURE_CODE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\backend\dist\lao-backend\lao-backend.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify backend signature
        shell: pwsh
        run: |
          $backendExe = "backend\dist\lao-backend\lao-backend.exe"
          $signature = Get-AuthenticodeSignature -LiteralPath $backendExe

          $subject = if ($signature.SignerCertificate) {
            $signature.SignerCertificate.Subject
          } else {
            "(none)"
          }

          Write-Host "Status:  $($signature.Status)"
          Write-Host "Subject: $subject"
          Write-Host "File:    $backendExe"

          if ($signature.Status -ne "Valid") {
            throw "Backend executable is not validly signed."
          }

      # electron-builder's Azure signing path requires an auth configuration that
      # does not work with this GitHub OIDC-only setup. We therefore package first
      # without signing, and use Azure Artifact Signing for the generated EXEs.
      - name: Package unpacked Windows application
        shell: pwsh
        run: |
          npx electron-builder --win --dir --publish never

      - name: Confirm unpacked application exists
        shell: pwsh
        run: |
          $appExe = "release\win-unpacked\Hue Labs.exe"
          $bundledBackend = "release\win-unpacked\resources\backend\lao-backend.exe"

          if (-not (Test-Path -LiteralPath $appExe)) {
            throw "Unpacked application was not created: $appExe"
          }

          if (-not (Test-Path -LiteralPath $bundledBackend)) {
            throw "Bundled backend was not created: $bundledBackend"
          }

          Write-Host "Unpacked application and bundled backend exist."

      - name: Sign unpacked Hue Labs application
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.AZURE_CODE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_CERT_PROFILE }}
          files: ${{ github.workspace }}\release\win-unpacked\Hue Labs.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify unpacked application signatures
        shell: pwsh
        run: |
          $targets = @(
            "release\win-unpacked\Hue Labs.exe",
            "release\win-unpacked\resources\backend\lao-backend.exe"
          )

          $failed = $false

          foreach ($target in $targets) {
            if (-not (Test-Path -LiteralPath $target)) {
              Write-Host "MISSING   $target"
              $failed = $true
              continue
            }

            $signature = Get-AuthenticodeSignature -LiteralPath $target
            $subject = if ($signature.SignerCertificate) {
              $signature.SignerCertificate.Subject
            } else {
              "(none)"
            }

            Write-Host "$($signature.Status.ToString().PadRight(10)) $target"
            Write-Host "           Signer: $subject"

            if ($signature.Status -ne "Valid") {
              $failed = $true
            }
          }

          if ($failed) {
            throw "The unpacked application contains missing or invalid signatures."
          }

          Write-Host "The unpacked application is validly signed."

      - name: Build installer and portable from signed application
        shell: pwsh
        run: |
          npx electron-builder --win nsis portable `
            --prepackaged "release\win-unpacked" `
            --publish never `

      - name: Confirm distributable artifacts exist
        shell: pwsh
        run: |
          $executables = @(Get-ChildItem -Path "release" -Filter "*.exe" -File)

          if ($executables.Count -lt 2) {
            Write-Host "EXE files found:"
            $executables | ForEach-Object { Write-Host $_.FullName }
            throw "Expected both installer and portable EXE artifacts."
          }

          if (-not (Test-Path -LiteralPath "release\latest.yml")) {
            throw "latest.yml was not generated."
          }

          Write-Host "Distributable artifacts:"
          $executables | ForEach-Object { Write-Host $_.FullName }

      - name: Sign installer and portable artifacts
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.AZURE_CODE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\release
          files-folder-filter: exe
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify all shipped executable signatures
        shell: pwsh
        run: |
          $targets = @(
            "release\win-unpacked\Hue Labs.exe",
            "release\win-unpacked\resources\backend\lao-backend.exe"
          )

          $targets += Get-ChildItem -Path "release" -Filter "*.exe" -File |
            ForEach-Object { $_.FullName }

          $targets = @($targets | Select-Object -Unique)

          if ($targets.Count -eq 0) {
            throw "No Windows executable artifacts were found."
          }

          $failed = $false

          foreach ($target in $targets) {
            if (-not (Test-Path -LiteralPath $target)) {
              Write-Host "MISSING   $target"
              $failed = $true
              continue
            }

            $signature = Get-AuthenticodeSignature -LiteralPath $target
            $subject = if ($signature.SignerCertificate) {
              $signature.SignerCertificate.Subject
            } else {
              "(none)"
            }

            Write-Host "$($signature.Status.ToString().PadRight(10)) $target"
            Write-Host "           Signer: $subject"

            if ($signature.Status -ne "Valid") {
              $failed = $true
            }
          }

          if ($failed) {
            throw "One or more shipped executable artifacts are missing or not validly signed."
          }

          Write-Host "All shipped executable artifacts are validly signed."

      - name: Upload signed workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hue-labs-windows-signed
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 14

      # Publish the exact files that passed the signature checks. This avoids
      # electron-builder rebuilding the app and re-entering its unsupported
      # Azure authentication path.
      - name: Publish verified GitHub Release
        if: ${{ inputs.publish }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $package = Get-Content -Raw "package.json" | ConvertFrom-Json
          $version = $package.version
          $tag = "v$version"

          $assets = @()
          $assets += Get-ChildItem -Path "release" -Filter "*.exe" -File |
            ForEach-Object { $_.FullName }
          $assets += Get-ChildItem -Path "release" -Filter "*.blockmap" -File |
            ForEach-Object { $_.FullName }

          if (Test-Path -LiteralPath "release\latest.yml") {
            $assets += (Resolve-Path "release\latest.yml").Path
          }

          $assets = @($assets | Select-Object -Unique)

          if ($assets.Count -eq 0) {
            throw "No release assets were found."
          }

          Write-Host "Release tag: $tag"
          Write-Host "Assets:"
          $assets | ForEach-Object { Write-Host $_ }

          gh release view $tag --repo "$env:GITHUB_REPOSITORY" *> $null

          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag already exists. Replacing matching assets."
            gh release upload $tag @assets `
              --repo "$env:GITHUB_REPOSITORY" `
              --clobber
          }
          else {
            Write-Host "Creating release $tag."
            gh release create $tag @assets `
              --repo "$env:GITHUB_REPOSITORY" `
              --target "$env:GITHUB_SHA" `
              --title $version `
              --generate-notes
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publishing failed."
          }

      - name: Azure logout
        if: always()
        shell: pwsh
        continue-on-error: true
        run: az logout
