# Hue Labs — production Windows release pipeline.
#
# Flow:
# Build → Azure OIDC login → sign backend → verify backend →
# package/sign Windows artifacts → verify → upload workflow artifacts →
# optionally publish with electron-builder → verify the published build.
#
# Required GitHub Environment:
#   release
#
# Required Environment Variables:
#   AZURE_TENANT_ID
#   AZURE_CLIENT_ID
#   AZURE_SUBSCRIPTION_ID
#
# The Azure federated credential must be scoped to:
#   Repository: AshK212/hue-labs-releases
#   Environment: release

name: Release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to GitHub Releases (disable for a signed dry run)"
        type: boolean
        required: true
        default: false

permissions:
  id-token: write
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, verify, and publish
    runs-on: windows-latest
    environment: release

    env:
      # Azure Artifact Signing configuration
      AZURE_CODE_SIGNING_ENDPOINT: https://eus.codesigning.azure.net/
      AZURE_TRUSTED_SIGNING_ACCOUNT: huelabs
      AZURE_CERT_PROFILE: huelabs-cert

      # IMPORTANT:
      # This must exactly match the Common Name (CN) of the signing certificate.
      # Update it after the first successful backend signing if Azure reports
      # a different certificate subject.
      AZURE_SIGN_PUBLISHER: Hue Labs

      # Azure OIDC identity from GitHub Environment variables
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          npm ci
          npm --prefix frontend ci
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Build frontend and Electron sources
        shell: pwsh
        run: npm run build

      - name: Build Python backend executable
        shell: pwsh
        run: npm run backend:build

      - name: Confirm backend executable exists
        shell: pwsh
        run: |
          $backendExe = "backend\dist\lao-backend\lao-backend.exe"

          if (-not (Test-Path -LiteralPath $backendExe)) {
            throw "Backend executable was not created: $backendExe"
          }

          Write-Host "Backend executable found: $backendExe"

      - name: Azure login using OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Sign backend executable with Azure Artifact Signing
        uses: azure/artifact-signing-action@v2
        with:
          endpoint: ${{ env.AZURE_CODE_SIGNING_ENDPOINT }}
          signing-account-name: ${{ env.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ env.AZURE_CERT_PROFILE }}
          files-folder: ${{ github.workspace }}\backend\dist\lao-backend
          files-folder-filter: exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Verify backend signature
        shell: pwsh
        run: |
          $backendExe = "backend\dist\lao-backend\lao-backend.exe"
          $signature = Get-AuthenticodeSignature -LiteralPath $backendExe

          $subject = if ($signature.SignerCertificate) {
            $signature.SignerCertificate.Subject
          } else {
            "(none)"
          }

          Write-Host "Status:  $($signature.Status)"
          Write-Host "Subject: $subject"
          Write-Host "File:    $backendExe"

          if ($signature.Status -ne "Valid") {
            throw "Backend executable is not validly signed."
          }

      - name: Package and sign Windows artifacts
        shell: pwsh
        run: |
          npx electron-builder --win --publish never `
            "-c.win.azureSignOptions.publisherName=$env:AZURE_SIGN_PUBLISHER" `
            "-c.win.azureSignOptions.endpoint=$env:AZURE_CODE_SIGNING_ENDPOINT" `
            "-c.win.azureSignOptions.codeSigningAccountName=$env:AZURE_TRUSTED_SIGNING_ACCOUNT" `
            "-c.win.azureSignOptions.certificateProfileName=$env:AZURE_CERT_PROFILE"

      - name: Verify signatures on packaged artifacts
        shell: pwsh
        run: |
          $targets = @(
            "release\win-unpacked\Hue Labs.exe",
            "release\win-unpacked\resources\backend\lao-backend.exe"
          )

          $releaseExecutables = Get-ChildItem -Path "release" -Filter "*.exe" -File |
            ForEach-Object { $_.FullName }

          $targets += $releaseExecutables
          $targets = $targets | Select-Object -Unique

          if ($targets.Count -eq 0) {
            throw "No Windows executable artifacts were found."
          }

          $failed = $false

          foreach ($target in $targets) {
            if (-not (Test-Path -LiteralPath $target)) {
              Write-Host "MISSING   $target"
              $failed = $true
              continue
            }

            $signature = Get-AuthenticodeSignature -LiteralPath $target
            $subject = if ($signature.SignerCertificate) {
              $signature.SignerCertificate.Subject
            } else {
              "(none)"
            }

            Write-Host "$($signature.Status.ToString().PadRight(10)) $target"
            Write-Host "           Signer: $subject"

            if ($signature.Status -ne "Valid") {
              $failed = $true
            }
          }

          if ($failed) {
            throw "One or more packaged artifacts are missing or not validly signed."
          }

          Write-Host "All packaged artifacts are validly signed."

      - name: Upload signed workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hue-labs-windows-signed
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error
          retention-days: 14

      # electron-builder does not provide a publish-only command for already-built
      # artifacts, so this step packages/signs again before publishing.
      - name: Publish GitHub Release with electron-builder
        if: ${{ inputs.publish }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --win --publish always `
            "-c.win.azureSignOptions.publisherName=$env:AZURE_SIGN_PUBLISHER" `
            "-c.win.azureSignOptions.endpoint=$env:AZURE_CODE_SIGNING_ENDPOINT" `
            "-c.win.azureSignOptions.codeSigningAccountName=$env:AZURE_TRUSTED_SIGNING_ACCOUNT" `
            "-c.win.azureSignOptions.certificateProfileName=$env:AZURE_CERT_PROFILE"

      - name: Verify signatures after publishing
        if: ${{ inputs.publish }}
        shell: pwsh
        run: |
          $targets = @(
            "release\win-unpacked\Hue Labs.exe",
            "release\win-unpacked\resources\backend\lao-backend.exe"
          )

          $releaseExecutables = Get-ChildItem -Path "release" -Filter "*.exe" -File |
            ForEach-Object { $_.FullName }

          $targets += $releaseExecutables
          $targets = $targets | Select-Object -Unique

          if ($targets.Count -eq 0) {
            throw "No published-build executable artifacts were found."
          }

          $failed = $false

          foreach ($target in $targets) {
            if (-not (Test-Path -LiteralPath $target)) {
              Write-Host "MISSING   $target"
              $failed = $true
              continue
            }

            $signature = Get-AuthenticodeSignature -LiteralPath $target
            $subject = if ($signature.SignerCertificate) {
              $signature.SignerCertificate.Subject
            } else {
              "(none)"
            }

            Write-Host "$($signature.Status.ToString().PadRight(10)) $target"
            Write-Host "           Signer: $subject"

            if ($signature.Status -ne "Valid") {
              $failed = $true
            }
          }

          if ($failed) {
            throw "The published build contains missing or invalid signatures."
          }

          Write-Host "All published-build artifacts are validly signed."

      - name: Azure logout
        if: always()
        shell: pwsh
        continue-on-error: true
        run: az logout
