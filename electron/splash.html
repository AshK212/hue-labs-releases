<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>Local AI Optimizer</title>
    <style>
      /* Palette mirrors the application (index.css) so the splash feels part of
         the same product, not a separate loader. */
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", "Inter", system-ui, sans-serif;
        color: #1f2740;
        background: #f5f7fc;
      }
      .splash {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background-image:
          radial-gradient(120% 80% at 50% 0%, #ffffff 0%, #eef1fb 60%, #e7ebf9 100%);
        border-radius: 14px;
        border: 1px solid rgba(111, 102, 236, 0.15);
      }
      .logo {
        width: 68px;
        height: 68px;
        border-radius: 18px;
        background-image: linear-gradient(135deg, #5c7fd6 0%, #6f66ec 55%, #8b84f2 100%);
        box-shadow: 0 12px 30px rgba(111, 102, 236, 0.35);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 32px;
        font-weight: 700;
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .subtitle {
        font-size: 13px;
        color: #6b7392;
        margin-top: -12px;
      }
      /* Indeterminate progress bar. */
      .bar {
        width: 220px;
        height: 4px;
        border-radius: 4px;
        background: rgba(111, 102, 236, 0.15);
        overflow: hidden;
      }
      .bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 4px;
        background-image: linear-gradient(90deg, #5c7fd6, #8b84f2);
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(320%); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo">L</div>
      <div class="title">Local AI Optimizer</div>
      <div class="subtitle">Starting your local AI engine…</div>
      <div class="bar"></div>
    </div>
  </body>
</html>
