<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>Hue Labs</title>
    <style>
      /* Palette mirrors the Hue Labs application (warm charcoal, paper text,
         white accent, no neon glow) so the splash feels part of the product. */
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Instrument Sans", "Segoe UI", "Inter", system-ui, sans-serif;
        color: #f4efe8;
        background: #1a1715;
      }
      .splash {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background-image:
          radial-gradient(120% 80% at 50% 0%, rgba(245, 243, 239, 0.05) 0%, rgba(26, 23, 21, 0) 55%),
          linear-gradient(180deg, #1e1a18 0%, #141210 100%);
        border-radius: 14px;
        border: 1px solid rgba(245, 243, 239, 0.1);
      }
      .logo {
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .title {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .subtitle {
        font-size: 13px;
        color: #9f9689;
        margin-top: -12px;
        font-family: "IBM Plex Mono", ui-monospace, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      /* Indeterminate progress bar. */
      .bar {
        width: 220px;
        height: 4px;
        border-radius: 4px;
        background: rgba(245, 243, 239, 0.1);
        overflow: hidden;
      }
      .bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 4px;
        background-image: linear-gradient(90deg, rgba(245, 243, 239, 0.7), #f4efe8);
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(320%); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo">
        <svg width="72" height="72" viewBox="0 0 32 32" fill="none">
          <rect x="6" y="6" width="20" height="20" rx="2.4" stroke="#F4EFE8" stroke-width="2" />
          <rect x="16.5" y="16.5" width="11" height="11" fill="#1A1715" />
          <rect x="17.6" y="17.6" width="6.6" height="6.6" rx="1.3" fill="#F4EFE8" />
        </svg>
      </div>
      <div class="title">Hue Labs</div>
      <div class="subtitle">Starting your local AI engine…</div>
      <div class="bar"></div>
    </div>
  </body>
</html>
