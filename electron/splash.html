<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline';" />
    <title>Local AI Optimizer</title>
    <style>
      /* Palette mirrors the application (index.css) so the splash feels part of
         the same product, not a separate loader. */
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: "Segoe UI", "Inter", system-ui, sans-serif;
        color: #f1f0eb;
        background: #0c0d0e;
      }
      .splash {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background-image:
          radial-gradient(120% 80% at 50% 0%, rgba(184, 242, 92, 0.08) 0%, rgba(12, 13, 14, 0) 55%),
          linear-gradient(180deg, #0d0e10 0%, #0a0b0c 100%);
        border-radius: 14px;
        border: 1px solid rgba(184, 242, 92, 0.12);
      }
      .logo {
        width: 72px;
        height: 72px;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: drop-shadow(0 0 18px rgba(184, 242, 92, 0.35));
      }
      .title {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.2px;
      }
      .subtitle {
        font-size: 13px;
        color: #878c89;
        margin-top: -12px;
        font-family: "IBM Plex Mono", ui-monospace, Consolas, monospace;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      /* Indeterminate progress bar. */
      .bar {
        width: 220px;
        height: 4px;
        border-radius: 4px;
        background: rgba(184, 242, 92, 0.14);
        overflow: hidden;
      }
      .bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        border-radius: 4px;
        background-image: linear-gradient(90deg, #93d24a, #b8f25c);
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(320%); }
      }
    </style>
  </head>
  <body>
    <div class="splash">
      <div class="logo">
        <svg width="72" height="72" viewBox="0 0 32 32" fill="none">
          <rect x="6" y="6" width="20" height="20" rx="2.4" stroke="#F1F0EB" stroke-width="2" />
          <rect x="16.5" y="16.5" width="11" height="11" fill="#0C0D0E" />
          <rect x="17.6" y="17.6" width="6.6" height="6.6" rx="1.3" fill="#B8F25C" />
        </svg>
      </div>
      <div class="title">Local AI Optimizer</div>
      <div class="subtitle">Starting your local AI engine…</div>
      <div class="bar"></div>
    </div>
  </body>
</html>
